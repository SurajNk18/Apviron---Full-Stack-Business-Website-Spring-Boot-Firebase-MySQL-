# ===================================================================
# Apviron Backend - Application Configuration
# ===================================================================

# ----- Server -----
server.port=8081

# ----- MySQL Database -----
spring.datasource.url=jdbc:mysql://localhost:3306/apviron_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Suraj18@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ----- Security -----
# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# ----- CORS (allow frontend on a different port) -----
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,null
