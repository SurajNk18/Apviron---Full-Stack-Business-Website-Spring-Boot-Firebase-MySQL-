<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Apviron Technologies</title>
    <meta name="description" content="Admin login portal for Apviron Technologies.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233b82f6'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='800' font-size='18'>A</text></svg>">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .admin-login-note {
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            font-size: 0.82rem;
            color: var(--clr-text-muted);
            line-height: 1.6;
        }
        .admin-login-note strong {
            color: var(--clr-text-primary);
        }
    </style>
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="navbar__logo">
                <img src="assets/images/logo.jpg" alt="Apviron Technologies" class="navbar__logo-img">
            </a>
            <div class="navbar__nav" id="navMenu">
                <a href="index.html" class="navbar__link">Home</a>
                <div class="navbar__dropdown-parent">
                  <a href="about.html" class="navbar__link navbar__dropdown-toggle">
                    About Us <span class="dropdown-arrow">▼</span>
                  </a>
                  <div class="navbar__dropdown">
                    <a href="about.html#who-we-are"><span class="sub-icon"><i class="fas fa-building"></i></span> Who We Are</a>
                    <a href="about.html#our-purpose"><span class="sub-icon"><i class="fas fa-bullseye"></i></span> Mission & Vision</a>
                    <a href="about.html#our-values"><span class="sub-icon"><i class="fas fa-lightbulb"></i></span> Our Values</a>
                    <a href="about.html#partner-with-us"><span class="sub-icon"><i class="fas fa-handshake"></i></span> Partner With Us</a>
                  </div>
                </div>
                <a href="services.html" class="navbar__link">Services</a>
                <a href="contact.html" class="navbar__link">Contact Us</a>
            </div>
            <button class="navbar__hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="nav-overlay" id="navOverlay"></div>
    </nav>

    <!-- ========== ADMIN LOGIN SECTION ========== -->
    <section class="auth-page">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-card__header">
                <div class="auth-card__logo">
                    <img src="assets/images/logo.jpg" alt="Apviron">
                </div>
                <div class="admin-badge"><i class="fas fa-shield-alt" style="margin-right:4px"></i> Admin Portal</div>
                <h1 class="auth-card__title">Admin Login</h1>
                <p class="auth-card__subtitle">Sign in with your admin credentials</p>
            </div>

            <!-- Message Area -->
            <div id="authMessage" class="auth-message"></div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" novalidate>
                <div class="auth-form__group">
                    <label class="auth-form__label" for="loginEmail">Email Address</label>
                    <div class="auth-form__input-wrapper">
                        <input 
                            type="email" 
                            id="loginEmail" 
                            class="auth-form__input" 
                            placeholder="admin@apviron.com" 
                            required 
                            autocomplete="email"
                        >
                        <span class="auth-form__icon"><i class="fas fa-envelope"></i></span>
                    </div>
                </div>

                <div class="auth-form__group">
                    <label class="auth-form__label" for="loginPassword">Password</label>
                    <div class="auth-form__input-wrapper">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="auth-form__input" 
                            placeholder="Enter your password" 
                            required 
                            autocomplete="current-password"
                        >
                        <span class="auth-form__icon"><i class="fas fa-lock"></i></span>
                        <button type="button" class="auth-form__toggle-pw" id="togglePassword" aria-label="Toggle password visibility"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <button type="submit" class="auth-form__submit" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>

            <!-- Info Note -->
            <div class="admin-login-note">
                <strong><i class="fas fa-lock" style="margin-right:4px"></i> Restricted Access</strong><br>
                This login is for authorized administrators only. If you're looking to contact us, please visit our <a href="contact.html" style="color: var(--clr-accent);">Contact page</a>.
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="assets/js/navbar.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    <script>
        // Toggle password visibility
        const toggleBtn = document.getElementById('togglePassword');
        const pwField = document.getElementById('loginPassword');
        if (toggleBtn && pwField) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = pwField.type === 'password';
                pwField.type = isPassword ? 'text' : 'password';
                toggleBtn.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
            });
        }
    </script>
</body>
</html>
